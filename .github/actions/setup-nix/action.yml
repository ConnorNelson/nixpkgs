name: setup-nix

inputs:
  system:
    type: string
    required: true
  sandbox:
    type: string
    default: "true"
  extra-nix-config:
    type: string
    default: ""

runs:
  using: composite
  steps:
    - name: reclaim space (linux)
      if: runner.os == 'Linux'
      uses: wimpysworld/nothing-but-nix@main
      with:
        hatchet-protocol: rampage

    - name: configure swap (linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "::group::memory (before)"
        free -h || true
        swapon --show || true
        df -h /mnt || true
        echo "::endgroup::"

        swap_ready=0

        # Prefer zram so we do not exhaust the runner's root filesystem.
        if sudo modprobe zram && [ -e /dev/zram0 ]; then
          echo lz4 | sudo tee /sys/block/zram0/comp_algorithm >/dev/null || true
          echo 16G | sudo tee /sys/block/zram0/disksize >/dev/null
          sudo mkswap /dev/zram0
          sudo swapon /dev/zram0
          swap_ready=1
        fi

        # Fall back to a conservative file-backed swap if /mnt has room.
        if [ "$swap_ready" -eq 0 ] && ! sudo swapon --show | grep -q '/mnt/nixpkgs-review.swap'; then
          avail_mb=$(df --output=avail -m /mnt 2>/dev/null | awk 'NR==2 { print $1 }')
          if [ -n "$avail_mb" ] && [ "$avail_mb" -gt 6144 ]; then
            swap_mb=$(( avail_mb > 12288 ? 8192 : avail_mb - 2048 ))
            sudo fallocate -l "${swap_mb}M" /mnt/nixpkgs-review.swap || \
              sudo dd if=/dev/zero of=/mnt/nixpkgs-review.swap bs=1M count="$swap_mb" status=progress
            sudo chmod 600 /mnt/nixpkgs-review.swap
            sudo mkswap /mnt/nixpkgs-review.swap
            sudo swapon /mnt/nixpkgs-review.swap
            swap_ready=1
          fi
        fi

        echo "::group::memory (after)"
        free -h || true
        swapon --show || true
        echo "::endgroup::"

    - name: reclaim space (darwin)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        echo "::group::disk space (before)"
        sudo df -h
        echo "::endgroup::"

        echo "::group::disable mds"
        sudo mdutil -i off -a || echo "mdutil failed"
        sudo launchctl unload -w /System/Library/LaunchDaemons/com.apple.metadata.mds.plist \
         || echo "launchctl unload failed"
        echo "::endgroup::"

        echo "Background space expansion started. /nix will grow as space becomes available."
        sudo rm -rf \
          /Applications/Xcode_* \
          /Library/Developer/CoreSimulator \
          /Library/Frameworks \
          /Users/runner/.dotnet \
          /Users/runner/.rustup \
          /Users/runner/Library/Android \
          /Users/runner/Library/Caches \
          /Users/runner/Library/Developer/CoreSimulator \
          /Users/runner/hostedtoolcache &

    - name: install nix
      uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          accept-flake-config = true
          build-dir = /nix/build
          sandbox = ${{ inputs.sandbox }}
          system = ${{ inputs.system }}
          ${{ inputs.extra-nix-config }}

    - name: create build-dir
      shell: bash
      run: sudo mkdir -p /nix/build

    - name: post setup-nix
      if: runner.os == 'macOS'
      uses: srz-zumix/post-run-action@v2
      with:
        shell: bash -e {0}
        post-run: |
          echo "::group::disk space (after)"
          sudo df -h
          echo "::endgroup::"
